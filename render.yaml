services:
  - type: web
    name: ndc-pulse-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: ndc-db
          property: connectionString
  - type: web
    name: ndc-pulse-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist

databases:
  - name: ndc-db
    plan: free
