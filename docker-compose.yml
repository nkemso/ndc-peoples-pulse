version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ndc_user
      POSTGRES_PASSWORD: ndc_password
      POSTGRES_DB: ndc_pulse
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://ndc_user:ndc_password@db:5432/ndc_pulse
      - PUSHER_APP_ID=your_id
      - PUSHER_KEY=your_key
      - PUSHER_SECRET=your_secret
      - PUSHER_CLUSTER=your_cluster
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
